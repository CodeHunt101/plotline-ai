name: Supabase Keepalive

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Run keepalive query
        env:
          PGAPPNAME: plotline-ai-supabase-keepalive
          PGCONNECT_TIMEOUT: 15
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing SUPABASE_DB_URL GitHub secret."
            exit 1
          fi

          psql "$SUPABASE_DB_URL" \
            --no-psqlrc \
            --set ON_ERROR_STOP=1 \
            --command "select now() as keepalive_at, current_database() as database_name;"
