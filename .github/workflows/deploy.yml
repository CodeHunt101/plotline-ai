name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "wrangler.supabase.toml"
      - ".github/workflows/deploy.yml"

# Prevent concurrent deploys — only one at a time, never cancel mid-deploy
concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Supabase Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.supabase.toml
          secrets: |
            SUPABASE_URL
            SUPABASE_API_KEY
            WORKER_SHARED_SECRET
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          WORKER_SHARED_SECRET: ${{ secrets.WORKER_SHARED_SECRET }}
