name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to avoid wasted compute
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript type-check
        run: pnpm type-check

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:ci --coverage --coverageReporters=json-summary --coverageReporters=text

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # Only update the badge on pushes to main (not on PRs)
      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const pct = summary.total.lines.pct;
            const color = pct >= 90 ? '#4c1' : pct >= 75 ? '#dfb317' : '#e05d44';
            const label = 'coverage';
            const value = pct + '%';
            const svg = [
              '<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"106\" height=\"20\">',
              '<linearGradient id=\"s\" x2=\"0\" y2=\"100%\">',
              '<stop offset=\"0\" stop-color=\"#bbb\" stop-opacity=\".1\"/>',
              '<stop offset=\"1\" stop-opacity=\".1\"/>',
              '</linearGradient>',
              '<clipPath id=\"r\"><rect width=\"106\" height=\"20\" rx=\"3\" fill=\"#fff\"/></clipPath>',
              '<g clip-path=\"url(#r)\">',
              '<rect width=\"62\" height=\"20\" fill=\"#555\"/>',
              '<rect x=\"62\" width=\"44\" height=\"20\" fill=\"' + color + '\"/>',
              '<rect width=\"106\" height=\"20\" fill=\"url(#s)\"/>',
              '</g>',
              '<g fill=\"#fff\" text-anchor=\"middle\" font-family=\"DejaVu Sans,Verdana,Geneva,sans-serif\" font-size=\"11\">',
              '<text x=\"31\" y=\"15\" fill=\"#010101\" fill-opacity=\".3\">' + label + '</text>',
              '<text x=\"31\" y=\"14\">' + label + '</text>',
              '<text x=\"83\" y=\"15\" fill=\"#010101\" fill-opacity=\".3\">' + value + '</text>',
              '<text x=\"83\" y=\"14\">' + value + '</text>',
              '</g>',
              '</svg>'
            ].join('');
            fs.writeFileSync('coverage-badge.svg', svg);
            console.log('Generated badge: ' + pct + '%');
          "

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: coverage-badge.svg
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
